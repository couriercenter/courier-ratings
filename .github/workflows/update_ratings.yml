name: Update Courier Ratings

on:
  schedule:
    - cron: '0 23 * * 6'   # Κυριακή 01:00 Ελλάδα (Σάββατο 23:00 UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history για να αποφύγουμε conflicts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Run ratings script
        env:
          PLACES_API_KEY: ${{ secrets.PLACES_API_KEY }}
        run: python courier_ratings.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add index.html history.json
          git diff --staged --quiet || git commit -m "auto: update ratings $(date +%Y-%m-%d)"
          git push
