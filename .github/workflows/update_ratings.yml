name: Update Courier Ratings

on:
  schedule:
    - cron: '0 1 * * 0'   # Κάθε Κυριακή 01:00 UTC = 04:00 Ελλάδα με θερινή ώρα
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-courier-ratings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check if workflow should run
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual run. Continuing."
            exit 0
          fi

          if [ "$(date -u -d '+7 days' +%m)" = "$(date -u +%m)" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Scheduled run, but not the last Sunday of the month. Exiting before Google API calls."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled run on the last Sunday of the month. Continuing."
          fi

      - name: Checkout source repository
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: pip install requests pandas openpyxl

      - name: Check required secrets
        if: steps.gate.outputs.should_run == 'true'
        env:
          PLACES_API_KEY: ${{ secrets.PLACES_API_KEY }}
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          if [ -z "$PLACES_API_KEY" ]; then
            echo "Missing PLACES_API_KEY"
            exit 1
          fi

          if [ -z "$TARGET_REPO_TOKEN" ]; then
            echo "Missing TARGET_REPO_TOKEN"
            exit 1
          fi

      - name: Run ratings script
        if: steps.gate.outputs.should_run == 'true'
        env:
          PLACES_API_KEY: ${{ secrets.PLACES_API_KEY }}
        run: python courier_ratings.py

      - name: Commit and push source repository
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add history.json

          if git diff --staged --quiet; then
            echo "No source changes"
          else
            git commit -m "auto: update ratings $(date +%Y-%m-%d)"
            git push origin main
          fi

      - name: Sync history.json to public couriermarket repository
        if: steps.gate.outputs.should_run == 'true'
        env:
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${TARGET_REPO_TOKEN}@github.com/free-software-house/couriermarket.git public-repo

          cp history.json public-repo/history.json

          cd public-repo

          git config user.name  "data-sync-bot"
          git config user.email "data-sync-bot@users.noreply.github.com"

          git add history.json

          if git diff --staged --quiet; then
            echo "No public repo changes"
          else
            git commit -m "auto: update history data"
            git push origin main
          fi
