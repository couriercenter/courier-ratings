name: Test sync history only

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-sync-history-only
  cancel-in-progress: false

jobs:
  sync-history-only:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Check required secret
        env:
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          if [ -z "$TARGET_REPO_TOKEN" ]; then
            echo "Missing TARGET_REPO_TOKEN"
            exit 1
          fi

      - name: Sync existing history.json to public couriermarket repository
        env:
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          if [ ! -f history.json ]; then
            echo "history.json not found in source repository"
            exit 1
          fi

          git clone https://x-access-token:${TARGET_REPO_TOKEN}@github.com/free-software-house/couriermarket.git public-repo

          cp history.json public-repo/history.json

          cd public-repo

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add history.json

          if git diff --staged --quiet; then
            echo "No public repo changes"
          else
            git commit -m "test: sync existing history data"
            git push origin main
          fi
